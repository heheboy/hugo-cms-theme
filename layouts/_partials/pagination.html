{{ if gt .Paginator.TotalPages 1 }}
<nav class="pagination">
    {{ if .Paginator.HasPrev }}
    <a href="{{ .Paginator.Prev.URL }}" class="pagination-prev">← 上一页</a>
    {{ else }}
    <span class="pagination-prev disabled">← 上一页</span>
    {{ end }}

    <span class="pagination-info">
        第 {{ .Paginator.PageNumber }} 页，共 {{ .Paginator.TotalPages }} 页
    </span>

    {{ if .Paginator.HasNext }}
    <a href="{{ .Paginator.Next.URL }}" class="pagination-next">下一页 →</a>
    {{ else }}
    <span class="pagination-next disabled">下一页 →</span>
    {{ end }}
</nav>
{{ end }}
